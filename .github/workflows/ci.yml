name: Build and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    name: Resolve release
    runs-on: ubuntu-24.04
    outputs:
      package_version: ${{ steps.release.outputs.package_version }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_version: ${{ steps.release.outputs.release_version }}
      source_sha: ${{ steps.release.outputs.source_sha }}
      tag_exists: ${{ steps.release.outputs.tag_exists }}
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag and source
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "push" ]]; then
            release_tag="$REF_NAME"
          else
            release_tag=""
            while IFS= read -r tag; do
              if [[ "$tag" =~ ^v[0-9]+(\.[0-9]+)+$ ]]; then
                release_tag="$tag"
                break
              fi
            done < <(git tag --list 'v*' --sort=-version:refname)
            release_tag="${release_tag:-v0.1}"
          fi

          if [[ ! "$release_tag" =~ ^v[0-9]+(\.[0-9]+)+$ ]]; then
            echo "Release tag must use v<version>, got $release_tag" >&2
            exit 1
          fi

          if git show-ref --verify --quiet "refs/tags/$release_tag"; then
            source_sha="$(git rev-list -n 1 "$release_tag")"
            tag_exists=true
          else
            source_sha="$EVENT_SHA"
            tag_exists=false
          fi

          package_version="$(git show "${source_sha}:CMakeLists.txt" | sed -nE 's/^[[:space:]]*project\(econv VERSION ([^[:space:]]+) LANGUAGES CXX\).*/\1/p')"
          manifest_version="$(git show "${source_sha}:vcpkg.json" | jq -r '."version-string"')"

          if [[ -z "$package_version" || "$package_version" != "$manifest_version" ]]; then
            echo "Version mismatch at $source_sha: CMake=${package_version:-missing}, vcpkg=${manifest_version:-missing}" >&2
            exit 1
          fi

          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_version=${release_tag#v}" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$tag_exists" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-2025
            platform: windows-x64
            artifact: econv-windows-x64
          - name: Linux x64
            runner: ubuntu-24.04
            platform: linux-x64
            artifact: econv-linux-x64
          - name: macOS arm64
            runner: macos-15
            platform: macos-arm64
            artifact: econv-macos-arm64
          - name: macOS x64
            runner: macos-15-intel
            platform: macos-x64
            artifact: econv-macos-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.metadata.outputs.source_sha }}

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: "**/vcpkg.json"

      - name: Build, test, and package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/release.ps1 -OutputDirectory dist

      - name: Build, test, and package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/release-unix.sh --platform "${{ matrix.platform }}" --output-directory dist

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs:
      - metadata
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: econv-*
          path: dist
          merge-multiple: true

      - name: Validate release assets
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.package_version }}
        run: |
          set -euo pipefail

          expected=(
            "econv-$VERSION-windows-x64.zip"
            "econv-$VERSION-windows-x64.zip.sha256"
            "econv-$VERSION-linux-x64.tar.gz"
            "econv-$VERSION-linux-x64.tar.gz.sha256"
            "econv-$VERSION-macos-arm64.tar.gz"
            "econv-$VERSION-macos-arm64.tar.gz.sha256"
            "econv-$VERSION-macos-x64.tar.gz"
            "econv-$VERSION-macos-x64.tar.gz.sha256"
          )

          for asset in "${expected[@]}"; do
            [[ -f "dist/$asset" ]] || { echo "Missing release asset: $asset" >&2; exit 1; }
          done

          actual_count="$(find dist -maxdepth 1 -type f | wc -l | tr -d ' ')"
          [[ "$actual_count" == "${#expected[@]}" ]] || {
            echo "Expected ${#expected[@]} release assets, found $actual_count" >&2
            find dist -maxdepth 1 -type f -print >&2
            exit 1
          }

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.metadata.outputs.release_version }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
          TAG_EXISTS: ${{ needs.metadata.outputs.tag_exists }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          elif [[ "$TAG_EXISTS" == "true" ]]; then
            gh release create "$RELEASE_TAG" dist/* \
              --verify-tag \
              --generate-notes \
              --title "econv $RELEASE_VERSION"
          else
            gh release create "$RELEASE_TAG" dist/* \
              --target "$SOURCE_SHA" \
              --generate-notes \
              --title "econv $RELEASE_VERSION"
          fi
